name: ETFダッシュボード更新

on:
  schedule:
    # 毎日 UTC 7:00（日本時間 16:00）に実行
    - cron: '0 7 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージインストール
        run: pip install yfinance

      - name: ETFデータ取得 & HTML生成
        run: python etf_dashboard.py

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📊 ETFデータ自動更新 $(date +'%Y-%m-%d %H:%M')"
          git push
